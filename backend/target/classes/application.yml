spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/demo
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.format_sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
server:
  port: 8080

jwt:
  secret: myverysecretkeythatshouldbereplaced
  expiration: 86400000
openai:
  api:
  key: ${OPENAI_API_KEY}

